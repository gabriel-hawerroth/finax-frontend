<div id="sidebar" [class.minimized]="minimized()">
  @if (!isMobile()) {
    <app-logo-title [minimized]="minimized()" />
  }

  <div class="navigation">
    <div class="nav-ul">
      <app-sidebar-itens [items]="routes" [minimized]="minimized()" />
    </div>
  </div>

  <div class="user-options">
    <div class="nav-ul">
      <app-sidebar-itens
        [class.hidden]="!userActionsUl"
        [items]="bottomRoutes"
        [minimized]="minimized()"
      />

      <div class="user-item" (click)="userActionsUl = !userActionsUl">
        <img
          [ngSrc]="
            (utils.userImage | async) ||
            cloudFireCdnImgsLink + 'user-image.webp'
          "
          width="28"
          height="28"
          alt="user profile image"
          priority
        />

        <span>{{ utils.username | async }}</span>

        <div class="user-expand">
          <i class="material-symbols-rounded">
            {{ userActionsUl ? "expand_more" : "expand_less" }}
          </i>
        </div>
      </div>
    </div>
  </div>
</div>
