<mat-card class="balance">
  <div class="balance-content" #balanceContent>
    <div class="title">{{ title() | translate }}</div>

    <div class="amount" [style.font-size]="fontSize()">
      {{ currency() }}&nbsp;{{ value() | customCurrency }}
    </div>
  </div>

  <div class="icon">
    <span
      class="material-symbols-rounded"
      [style.background-color]="iconColor()"
    >
      {{ icon() }}
    </span>
  </div>
</mat-card>
